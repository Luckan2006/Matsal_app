name: Ping Supabase to Keep Active

# Denna action körs enligt det schema vi definierar
on:
  schedule:
    - cron: '0 0 * * *'  # Kör varje dag vid midnatt UTC (00:00)

jobs:
  ping_supabase:
    runs-on: ubuntu-latest   # Kör på en Ubuntu-maskin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2  # Hämtar vårt repo

      - name: Install Node.js
        uses: actions/setup-node@v2  # Installerar Node.js
        with:
          node-version: '14'  # Vi använder Node.js 14 här

      - name: Install dependencies
        run: npm install @supabase/supabase-js  # Installerar Supabase SDK

      - name: Run ping script
        run: node keepAlive.js  # Kör skriptet som gör API-anropet

